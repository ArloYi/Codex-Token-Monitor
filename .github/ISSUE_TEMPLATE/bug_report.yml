name: Bug 报告
description: 报告可复现的显示、数据或窗口行为问题
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: 请勿粘贴 Token、Cookie、完整的 ~/.codex 文件或数据库。
  - type: input
    id: macos
    attributes:
      label: macOS 版本
      placeholder: 例如 macOS 15.5
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: 从启动应用开始，逐步描述操作。
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期结果
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: 脱敏后的截图或日志
