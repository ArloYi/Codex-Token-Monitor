<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="760" viewBox="0 0 1600 760" role="img" aria-labelledby="title desc">
  <title id="title">Codex 深色环形额度仪表</title>
  <desc id="desc">默认显示环形剩余额度、已用比例和进度条，悬停后向下显示三行项目详情。</desc>
  <defs>
    <linearGradient id="canvas" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#edf1f6"/>
      <stop offset="1" stop-color="#dbe2eb"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#17191d"/>
      <stop offset="1" stop-color="#202328"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#101826" flood-opacity=".3"/>
    </filter>
  </defs>

  <rect width="1600" height="760" fill="url(#canvas)"/>
  <text x="70" y="70" fill="#17202b" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="30" font-weight="700">环形额度仪表 · 悬停展开详情</text>
  <text x="70" y="102" fill="#5a6675" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="16">按参考图实现固定深色卡片；真实接口没有绝对额度上限，因此使用已用百分比。</text>

  <g>
    <rect x="40" y="140" width="740" height="560" rx="26" fill="#f8f9fb" stroke="#bcc6d2"/>
    <rect x="40" y="140" width="740" height="54" rx="26" fill="#eef1f5"/>
    <circle cx="75" cy="167" r="6" fill="#ff605c"/><circle cx="96" cy="167" r="6" fill="#ffbd44"/><circle cx="117" cy="167" r="6" fill="#00ca4e"/>
    <text x="145" y="173" fill="#5c6570" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="14" font-weight="600">默认状态</text>
    <rect x="70" y="225" width="165" height="18" rx="9" fill="#d9dee5"/>
    <rect x="70" y="273" width="600" height="12" rx="6" fill="#e5e8ed"/>
    <rect x="70" y="305" width="510" height="12" rx="6" fill="#e9ecf0"/>

    <g filter="url(#shadow)">
      <rect x="340" y="220" width="400" height="104" rx="15" fill="url(#card)" stroke="#ffffff" stroke-opacity=".12"/>
    </g>
    <circle cx="406" cy="272" r="38" fill="none" stroke="#ffffff" stroke-opacity=".11" stroke-width="8"/>
    <circle cx="406" cy="272" r="38" fill="none" stroke="#35c75a" stroke-width="8" stroke-linecap="round" stroke-dasharray="105 239" transform="rotate(-90 406 272)"/>
    <text x="406" y="280" text-anchor="middle" fill="#f5f7fa" font-family="SFMono-Regular, Menlo, monospace" font-size="22" font-weight="650">44%</text>
    <text x="464" y="250" fill="#f5f7fa" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="17" font-weight="650">额度剩余</text>
    <text x="464" y="276" fill="#ffffff" fill-opacity=".62" font-family="SFMono-Regular, Menlo, monospace" font-size="12.5" font-weight="500">本周期已用 56% / 100%</text>
    <rect x="464" y="299" width="252" height="7" rx="3.5" fill="#ffffff" fill-opacity=".1"/>
    <rect x="464" y="299" width="111" height="7" rx="3.5" fill="#35c75a"/>
    <text x="70" y="658" fill="#687382" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="14">默认只显示额度仪表</text>
  </g>

  <g>
    <rect x="820" y="140" width="740" height="560" rx="26" fill="#f8f9fb" stroke="#bcc6d2"/>
    <rect x="820" y="140" width="740" height="54" rx="26" fill="#eef1f5"/>
    <circle cx="855" cy="167" r="6" fill="#ff605c"/><circle cx="876" cy="167" r="6" fill="#ffbd44"/><circle cx="897" cy="167" r="6" fill="#00ca4e"/>
    <text x="925" y="173" fill="#5c6570" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="14" font-weight="600">鼠标悬停后</text>
    <rect x="850" y="225" width="165" height="18" rx="9" fill="#d9dee5"/>
    <rect x="850" y="273" width="430" height="12" rx="6" fill="#e5e8ed"/>

    <g filter="url(#shadow)">
      <rect x="1140" y="220" width="400" height="336" rx="15" fill="url(#card)" stroke="#ffffff" stroke-opacity=".12"/>
    </g>
    <circle cx="1206" cy="272" r="38" fill="none" stroke="#ffffff" stroke-opacity=".11" stroke-width="8"/>
    <circle cx="1206" cy="272" r="38" fill="none" stroke="#35c75a" stroke-width="8" stroke-linecap="round" stroke-dasharray="105 239" transform="rotate(-90 1206 272)"/>
    <text x="1206" y="280" text-anchor="middle" fill="#f5f7fa" font-family="SFMono-Regular, Menlo, monospace" font-size="22" font-weight="650">44%</text>
    <text x="1264" y="250" fill="#f5f7fa" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="17" font-weight="650">额度剩余</text>
    <text x="1264" y="276" fill="#ffffff" fill-opacity=".62" font-family="SFMono-Regular, Menlo, monospace" font-size="12.5" font-weight="500">本周期已用 56% / 100%</text>
    <rect x="1264" y="299" width="252" height="7" rx="3.5" fill="#ffffff" fill-opacity=".1"/>
    <rect x="1264" y="299" width="111" height="7" rx="3.5" fill="#35c75a"/>
    <line x1="1154" y1="324" x2="1526" y2="324" stroke="#ffffff" stroke-opacity=".075"/>

    <rect x="1150" y="336" width="380" height="64" rx="10" fill="#ffffff" fill-opacity=".045" stroke="#ffffff" stroke-opacity=".065"/>
    <path d="M1168 365v-3h8l3 3h6v16h-17z" fill="#ffffff" fill-opacity=".5"/>
    <text x="1200" y="358" fill="#ffffff" fill-opacity=".56" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="10.5">当前项目（本周）</text>
    <text x="1200" y="385" fill="#ffffff" fill-opacity=".92" font-family="SFMono-Regular, Menlo, monospace" font-size="13.5" font-weight="650">演示工具 · 1200万</text>
    <text x="1450" y="374" fill="#ffffff" fill-opacity=".64" font-family="SFMono-Regular, Menlo, monospace" font-size="13.5">10.0%</text>

    <rect x="1150" y="408" width="380" height="64" rx="10" fill="#ffffff" fill-opacity=".045" stroke="#ffffff" stroke-opacity=".065"/>
    <path d="M1168 434l9-5 9 5-9 5zM1168 440l9 5 9-5M1168 446l9 5 9-5" fill="none" stroke="#ffffff" stroke-opacity=".5" stroke-width="2.5"/>
    <text x="1200" y="430" fill="#ffffff" fill-opacity=".56" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="10.5">全部项目（本周）</text>
    <text x="1200" y="457" fill="#ffffff" fill-opacity=".92" font-family="SFMono-Regular, Menlo, monospace" font-size="13.5" font-weight="650">12000万</text>

    <rect x="1150" y="480" width="380" height="64" rx="10" fill="#ffffff" fill-opacity=".045" stroke="#ffffff" stroke-opacity=".065"/>
    <path d="M1167 528h20M1169 522l6-7 4 3 8-11M1183 507h4v4" fill="none" stroke="#ffffff" stroke-opacity=".5" stroke-width="2.5" stroke-linecap="round"/>
    <text x="1200" y="502" fill="#ffffff" fill-opacity=".56" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="10.5">历史总消耗</text>
    <text x="1200" y="529" fill="#ffffff" fill-opacity=".92" font-family="SFMono-Regular, Menlo, monospace" font-size="13.5" font-weight="650">1.00亿</text>
    <text x="850" y="658" fill="#687382" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="14">悬停后向下显示项目详情</text>
  </g>

  <path d="M770 382h60" fill="none" stroke="#627084" stroke-width="2" stroke-dasharray="5 7"/>
  <path d="M823 374l9 8-9 8" fill="none" stroke="#627084" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="735" y="419" fill="#576476" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif" font-size="13">悬停</text>
</svg>
